name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (Next.js + Prisma)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: chapitre
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/chapitre"
      # Secret factice (>= 32 c) pour satisfaire la config d'auth au build.
      AUTH_SECRET: "ci-placeholder-secret-0123456789-abcdefghijkl"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      # Build Next paresseux (client Prisma instancié à la demande) : pas de
      # requête DB au build, donc pas besoin de pousser le schéma. Le service
      # Postgres rend juste DATABASE_URL joignable au cas où.
      - name: Build (lint + typecheck inclus via next build)
        run: npm run build
