# Environnement de DÉVELOPPEMENT local : PostgreSQL + l'app Next en mode dev.
# Prérequis : copier .env.example en .env.
#
# Démarrage :  docker compose up --build
# La prod se déploie via la cible `runner` du Dockerfile (cf. README).

services:
  db:
    image: postgres:16-alpine
    container_name: chatpitre_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatpitre
      POSTGRES_PASSWORD: chatpitre
      POSTGRES_DB: chatpitre
    ports:
      - "5432:5432"
    volumes:
      - chatpitre_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatpitre -d chatpitre"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: chatpitre_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Dans le réseau Docker, la base est joignable via le nom de service `db`
      # (et non localhost) — on surcharge donc le DATABASE_URL du .env.
      DATABASE_URL: postgresql://chatpitre:chatpitre@db:5432/chatpitre
      # Hot reload fiable sur volume monté (WSL2 / système de fichiers Windows).
      WATCHPACK_POLLING: "true"
      # Documents téléversés, hors de /app (non masqué par le bind ci-dessous).
      UPLOAD_DIR: /data/uploads
    ports:
      - "3000:3000"
    volumes:
      # Code source monté pour le hot reload…
      - .:/app
      # …mais node_modules et .next restent ceux de l'image (volumes anonymes).
      - /app/node_modules
      - /app/.next
      # Documents téléversés (persistés hors du bind `.:/app`).
      - chatpitre_uploads:/data/uploads

volumes:
  chatpitre_pgdata:
  chatpitre_uploads:
